build: # 内部构建版本信息
  1.0.7: # 版本号
    3: # 迭代号
      - "alter table config
             add installed int default 1 not null comment '0=否;1=是';"
    4:
      - "alter table vmhost
             add flow_limit bigint default 0 not null comment '月流量上限' after bwlimit;"
      - "alter table vmhost
             add used_flow double default 0 not null comment '已用流量' after flow_limit;"
      - "create table flowdata
         (
             id          int auto_increment,
             node_id     int              null,
             hostid      int              null,
             rrd         json             null,
             used_flow   double default 0 not null comment '已用流量',
             status      int    default 0 not null comment '0=未同步;1=已同步',
             create_date varchar(20)      null,
             constraint flowdata_pk
                 primary key (id)
         );"
      - "alter table vncnode
             modify port int default 7600 not null comment '控制器端口';"
      - "alter table vncnode
             add proxy int default 0 not null comment '0=false;1=true' after protocol;"
      - "alter table vmhost
             add last_reset_flow bigint default 0 not null comment '上次重置流量月份' after used_flow;"
    5:
      - "alter table vmhost
             add mbps_rd int default 0 not null comment '读取长效限制 单位mb/s' after system_disk_size;

         alter table vmhost
             add mbps_rd_max int default 0 not null comment '读取突发限制 单位mb/s' after mbps_rd;

         alter table vmhost
             add mbps_wr int default 0 not null comment '写长效限制 单位mb/s' after mbps_rd_max;

         alter table vmhost
             add mbps_wr_max int default 0 not null comment '写突发限制 单位mb/s' after mbps_wr;

         alter table vmhost
             add iops_rd int default 0 not null comment 'iops读长效限制 单位ops/s' after mbps_wr_max;

         alter table vmhost
             add iops_rd_max int default 0 not null comment 'iops读突发限制 单位ops/s' after iops_rd;

         alter table vmhost
             add iops_wr int default 0 not null comment 'iops写长效限制 单位ops/s' after iops_rd_max;

         alter table vmhost
             add iops_wr_max int default 0 not null comment 'iops写突发限制 单位ops/s' after iops_wr;"
  1.0.8:
    1:
      - "create table zones
         (
             id         int auto_increment,
             node_id    int          null,
             type       varchar(255) null,
             zone       varchar(255) null,
             nodes      varchar(255) null,
             ipam       varchar(255) null,
             dns        varchar(255) null,
             reversedns varchar(255) null,
             state      varchar(255) default 'new' not null,
             constraint zones_pk
                 primary key (id)
         );"
      - "create table vnets
         (
             id    int auto_increment,
             vnet  varchar(255)                null,
             zone  varchar(255)                null,
             alias varchar(255)                null,
             tag   int                         null,
             type  varchar(255) default 'vnet' not null,
             state varchar(255) default 'new'  not null,
             constraint vnets_pk
                 primary key (id)
         );"
      - "create table subnet
         (
             id      int auto_increment,
             nodeid  int          null,
             subnet  varchar(255)                  null,
             type    varchar(255) default 'subnet' not null,
             vnet    varchar(255)                  not null,
             gateway varchar(255)                  null,
             dns     varchar(255)                  null,
             snat    int          default 0        not null,
             available int        default 0        not null,
             used   int          default 0        not null,
             disable int          default 0        not null,
             state   varchar(255) default 'new'    not null,
             constraint subnet_pk
                 primary key (id)
         );"
      - "create table subnetpool
         (
             id        int auto_increment,
             node_id   int           null,
             vm_id     int           null,
             subnat_id int           null,
             ip        varchar(255)  null,
             mask      varchar(15)   null,
             gateway   varchar(15)   null,
             mac       varchar(255)  null,
             dns       varchar(15)   null,
             status    int default 0 not null,
             constraint subnetpool_pk
                 primary key (id)
         );"
      - "create table natcontroller
         (
             id         int auto_increment,
             name       varchar(255)  null,
             host       varchar(255)  null,
             port       int           null,
             port_range varchar(255)  null,
             status     int default 0 not null,
             constraint natcontroller_pk
                 primary key (id)
         );"
  1.1.0:
    1:
      - "alter table master
                   add naton int default 0 not null comment '0关闭 1开启' after controller_port;"
      - "alter table master
                   add natbridge varchar(50) null comment 'nat网口' after naton;"
      - "alter table master
                   add natippool int default 0 not null comment 'nat ip池id' after natbridge;"
      - "alter table master
                   add nataddr varchar(50) null comment 'nat展示地址' after natippool;"
      - "alter table vmhost
                   add ifnat int default 0 not null comment '是否开启NAT' after ip_list;"
      - "alter table vmhost
                   add natnum int default 0 not null comment 'NAT数量' after ifnat;"
  1.1.1:
    1:
      - "alter table vmhost
                   add extra_flow_limit bigint default 0 not null comment '临时流量包' after natnum;"
    2:
      - "alter table vmhost
                   add reset_flow_time int default 0 not null comment '流量重置日 0开通日 1月初' after extra_flow_limit;"
    3:
      - "alter table vmhost
                   add out_flow int default 0 not null comment '超流操作0挂起 大于0表示限速x 单位kb' after reset_flow_time;"
  1.1.2:
    1:
      - "alter table vmhost
                   add delete_state int default 0 not null comment '删除状态 0正常 1回收站 2已删除' after out_flow;"
  1.2.0:
    1:
      - "create table vm_resource_rank
         (
             id                int auto_increment,
             rank_type         varchar(20)  not null comment 'cpu or memory',
             rank_no           int          not null comment 'rank number',
             host_id           int          null,
             vmid              int          null,
             hostname          varchar(255) null,
             node_id           int          null,
             node_name         varchar(255) null,
             cpu               double       default 0 not null,
             cpu_percent       double       default 0 not null,
             memory            bigint       default 0 not null,
             memory_mb         double       default 0 not null,
             max_memory        bigint       default 0 not null,
             max_memory_mb     double       default 0 not null,
             memory_percent    double       default 0 not null,
             collect_time      bigint       not null,
             constraint vm_resource_rank_pk
                 primary key (id),
             index vm_resource_rank_type_no_index (rank_type, rank_no)
         );"
      - "alter table master
                   add backup_storage varchar(255) null comment '备份存储' after auto_storage;"
      - "alter table area
                   add geo varchar(255) null comment '地理信息' after name;"
    2:
      - "alter table flowdata
                   add index idx_flowdata_host_status_create_date (hostid, status, create_date);"
      - "alter table vmhost
                   add index idx_vmhost_status_nodeid (status, nodeid);"
      - "alter table vmhost
                   add index idx_vmhost_reset_flow_time (reset_flow_time);"
    3:
      - "create table if not exists system_log
         (
             id               int auto_increment,
             request_id       varchar(64)   null,
             log_type         varchar(32)   null,
             level            varchar(16)   null,
             method           varchar(16)   null,
             uri              varchar(255)  null,
             path_pattern     varchar(255)  null,
             handler          varchar(255)  null,
             client_ip        varchar(64)   null,
             operator         varchar(255)  null,
             auth_type        varchar(32)   null,
             query_string     text          null,
             request_body     text          null,
             http_status      int           null,
             business_code    int           null,
             business_message varchar(255)  null,
             response_body    text          null,
             duration_ms      bigint        null,
             exception        text          null,
             content          text          null,
             create_time      bigint        null,
             constraint system_log_pk
                 primary key (id),
             index idx_system_log_create_time (create_time),
             index idx_system_log_type_create_time (log_type, create_time),
             index idx_system_log_request_id (request_id),
             index idx_system_log_level (level)
         );"
    4:
      - "alter table system_log
                   modify business_message text null;"
    5:
      - "update vmhost v
                   join os o on v.os_name = cast(o.id as char)
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and v.os_name is not null;"
      - "update vmhost v
                   join os o on v.os_name = o.file_name
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and v.os_name is not null;"
      - "update vmhost v
                   join os o on v.os = o.file_name
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                   and (v.os_name is null or v.os_name = '');"
      - "update vmhost v
                   join os o on v.os = o.name
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and (v.os_name is null or v.os_name = '');"
      - "update vmhost v
                   join os o on v.os = cast(o.id as char)
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and (v.os_name is null or v.os_name = '');"
    6:
      - "alter table vmhost
                   add network_type varchar(20) default 'classic' not null comment '网络类型 classic/vpc' after bridge;"
      - "alter table vmhost
                   add vpc_subnet_id int null comment 'VPC子网ID' after network_type;"
      - "update vmhost v
                   join os o on v.os = o.name
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and (v.os_name is null or v.os_name = '');"
      - "update vmhost v
                   join os o on v.os = cast(o.id as char)
                   set v.os_name = o.name
                   where o.name is not null
                     and o.name <> ''
                     and (v.os_name is null or v.os_name = '');"
    7:
      - "create table if not exists vpc_ip_binding
         (
             id             int auto_increment
                 primary key,
             host_id        int         not null comment '虚拟机主机ID',
             vm_id          int         null comment 'Proxmox VMID',
             node_id        int         not null comment '节点ID',
             vpc_subnet_id  int         null comment 'VPC子网ID',
             ippool_id      int         null comment '公网IP池明细ID',
             subnetpool_id  int         null comment '私网IP池明细ID',
             public_ip      varchar(64) not null comment '公网IP',
             private_ip     varchar(64) not null comment '私网IP',
             forward_mode   varchar(20) default 'nat_1to1' not null comment '转发模式',
             status         int         default 1          not null comment '状态 0已删除 1有效',
             create_time    bigint      null,
             update_time    bigint      null,
             index idx_vpc_ip_binding_host_status (host_id, status),
             index idx_vpc_ip_binding_public_ip (public_ip),
             index idx_vpc_ip_binding_private_ip (private_ip)
         ) comment 'VPC公网IP与私网IP绑定关系';"
    8:
      - "alter table vmhost
                   modify network_type varchar(20) default 'classic' not null comment '网络类型 classic/vpc';"
      - "alter table vmhost
                   modify vpc_subnet_id int null comment 'VPC子网ID';"
      - "alter table vpc_ip_binding comment 'VPC公网IP与私网IP绑定关系';"
      - "alter table vpc_ip_binding
                   modify host_id int not null comment '虚拟机主机ID',
                   modify vm_id int null comment 'Proxmox VMID',
                   modify node_id int not null comment '节点ID',
                   modify vpc_subnet_id int null comment 'VPC子网ID',
                   modify ippool_id int null comment '公网IP池明细ID',
                   modify subnetpool_id int null comment '私网IP池明细ID',
                   modify public_ip varchar(64) not null comment '公网IP',
                   modify private_ip varchar(64) not null comment '私网IP',
                   modify forward_mode varchar(20) default 'nat_1to1' not null comment '转发模式',
                   modify status int default 1 not null comment '状态 0已删除 1有效';"
    9:
      - "create table if not exists security_group
         (
             id                     int auto_increment
                 primary key,
             name                   varchar(100)             not null comment '安全组名称',
             description            varchar(255)             null comment '描述',
             default_ingress_action varchar(20) default 'drop' not null comment '默认入站动作 accept/drop',
             default_egress_action  varchar(20) default 'accept' not null comment '默认出站动作 accept/drop',
             is_template            int         default 0    not null comment '是否模板 0否 1是',
             is_default             int         default 0    not null comment '是否默认安全组 0否 1是',
             status                 int         default 1    not null comment '状态 0已删除 1有效',
             create_time            bigint                   null,
             update_time            bigint                   null,
             index idx_security_group_status (status),
             index idx_security_group_template_default (is_template, is_default)
         ) comment '安全组';"
      - "create table if not exists security_group_rule
         (
             id              int auto_increment
                 primary key,
             group_id        int                         not null comment '安全组ID',
             direction       varchar(20) default 'ingress' not null comment '方向 ingress/egress',
             protocol        varchar(20) default 'all'   not null comment '协议 tcp/udp/icmp/all',
             port_start      int                         null comment '起始端口或ICMP类型',
             port_end        int                         null comment '结束端口',
             remote_cidr     varchar(64) default '0.0.0.0/0' not null comment '远端CIDR',
             remote_group_id int                         null comment '引用安全组ID',
             action          varchar(20) default 'accept' not null comment '动作 accept/drop',
             priority        int         default 100     not null comment '优先级，数字越小越优先',
             remark          varchar(255)                null comment '备注',
             status          int         default 1       not null comment '状态 0已删除 1有效',
             create_time     bigint                      null,
             update_time     bigint                      null,
             index idx_security_group_rule_group (group_id, status, priority),
             index idx_security_group_rule_remote_group (remote_group_id)
         ) comment '安全组规则';"
      - "create table if not exists security_group_binding
         (
             id           int auto_increment
                 primary key,
             group_id     int                         not null comment '安全组ID',
             host_id      int                         not null comment '虚拟机主机ID',
             vm_id        int                         null comment 'Proxmox VMID',
             node_id      int                         not null comment '节点ID',
             network_type varchar(20) default 'classic' not null comment '网络类型 classic/vpc',
             status       int         default 1       not null comment '状态 0已删除 1有效',
             create_time  bigint                      null,
             update_time  bigint                      null,
             index idx_security_group_binding_host (host_id, status),
             index idx_security_group_binding_group (group_id, status)
         ) comment '安全组绑定';"
      - "create table if not exists security_group_sync
         (
             id             int auto_increment
                 primary key,
             host_id        int          not null comment '虚拟机主机ID',
             vm_id          int          null comment 'Proxmox VMID',
             node_id        int          not null comment '节点ID',
             rule_hash      varchar(128) null comment '规则哈希',
             in_sync        int default 0 not null comment '是否一致 0否 1是',
             last_message   varchar(255) null comment '最后同步消息',
             last_sync_time bigint       null comment '最后同步时间',
             index idx_security_group_sync_host (host_id),
             index idx_security_group_sync_node (node_id)
         ) comment '安全组同步状态';"
    10:
      - "alter table security_group
                   add host_id int null comment '虚拟机主机ID' after id;"
      - "alter table security_group
                   add index idx_security_group_host_status (host_id, status);"
  1.2.1:
    1:
      - "alter table subnetpool
                   add unique index uk_subnetpool_node_subnet_ip (node_id, subnat_id, ip);"
